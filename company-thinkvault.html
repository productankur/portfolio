<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>ThinkVault — Ankur Ratwaya</title>
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,400;1,9..144,300&family=DM+Sans:wght@300;400;500&family=Space+Mono:wght@400&display=swap" rel="stylesheet"/>
  <style>
    :root{--text-1:#18170f;--text-2:#5a5849;--text-3:#9a9486;--border:#e4e2db;--off-white:#f9f8f5;--white:#fff;--tech-mid:#1a7a4a;--font-display:'Fraunces',serif;--font-body:'DM Sans',sans-serif;--font-mono:'Space Mono',monospace}
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    body{font-family:var(--font-body);background:var(--off-white);color:var(--text-1);line-height:1.6}
    .container{max-width:800px;margin:0 auto;padding:48px 24px}
    .back{display:inline-flex;align-items:center;gap:6px;font-size:12px;color:var(--text-3);margin-bottom:40px;border:1px solid var(--border);padding:7px 14px;border-radius:40px;background:var(--white);transition:color 0.2s}
    .back:hover{color:var(--text-1)}
    .co-label{font-family:var(--font-mono);font-size:10px;letter-spacing:2px;text-transform:uppercase;color:var(--text-3);margin-bottom:8px}
    .co-name{font-family:var(--font-display);font-size:clamp(28px,5vw,44px);font-weight:400;color:var(--text-1);margin-bottom:6px}
    .co-meta{font-size:13px;color:var(--text-2);margin-bottom:32px;display:flex;align-items:center;gap:10px;flex-wrap:wrap}
    .co-period{font-family:var(--font-mono);font-size:11px;color:var(--text-3);background:var(--off-white);border:1px solid var(--border);border-radius:4px;padding:3px 9px}
    .placeholder-box{border:1.5px dashed var(--border);border-radius:16px;padding:52px 24px;text-align:center;background:var(--white);margin-top:20px}
    .placeholder-box p{font-size:15px;color:var(--text-2);font-weight:500;margin-bottom:8px}
    .placeholder-box span{font-size:13px;color:var(--text-3)}
  </style>
</head>
<body>
  <div class="container">
    <a class="back" href="index.html">← Back to portfolio</a>
    <div class="co-label">Experience</div>
    <h1 class="co-name">ThinkVault</h1>
    <div class="co-meta">Product Manager · Software Developer <span class="co-period">Oct 2014 – Jun 2021</span></div>
    <div class="placeholder-box">
      <p>Full case study coming soon</p>
      <span>Add your detailed work, achievements, and impact for this role here</span>
    </div>
  </div>
</body>
</html>
